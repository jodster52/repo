info:
  name: GetPetByStatusAvailable
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseURL}}/v2/pet/findByStatus?status=available"
  params:
    - name: status
      value: available
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Response 200", async () => {
          await expect(res.getStatus()).to.equal(200);
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
